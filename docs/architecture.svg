<svg width="100%" viewBox="0 0 680 320" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
<title>Reference architecture for the Olist Airflow + dbt ELT pipeline</title>
<desc>Apache Airflow orchestrates a five-stage batch ELT flow: sources, extract and load, warehouse, dbt transform, and analytics. Wrapped by Docker Compose, dbt tests and docs, GitHub Actions CI, and data quality checks.</desc>
