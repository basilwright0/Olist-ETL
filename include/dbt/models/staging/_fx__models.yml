version: 2

sources:
  - name: fx
    description: >
      Live USD->BRL exchange rates from the Frankfurter API (ECB reference
      rates), landed by the Airflow `load_fx_for_interval` task.
    schema: raw
    tables:
      - name: fx_rates

models:
  - name: stg_fx__rates
    description: One row per ECB business day with the USD->BRL rate.
    columns:
      - name: rate_date
        description: The ECB business day the rate applies to.
        data_tests: [not_null, unique]
      - name: brl_per_usd
        description: Brazilian reais per 1 US dollar.
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
              max_value: 10
