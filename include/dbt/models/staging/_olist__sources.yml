version: 2

sources:
  - name: olist
    description: >
      Raw Olist Brazilian e-commerce tables, landed by the Airflow extract tasks
      into the `raw` schema. All columns arrive as text and are typed in staging.
    schema: raw
    tables:
      - name: orders
      - name: order_items
      - name: customers
      - name: products
      - name: sellers
      - name: geolocation
      - name: order_payments
      - name: order_reviews
      - name: category_translation
