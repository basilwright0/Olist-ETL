name: 'olist'
version: '1.0.0'
config-version: 2
profile: 'olist'

vars:
  # Required by dbt_date (a dbt-expectations dependency).
  'dbt_date:time_zone': 'America/Sao_Paulo'

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
snapshot-paths: ["snapshots"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  olist:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: ephemeral
    marts:
      +materialized: table
      +schema: marts

snapshots:
  olist:
    +target_schema: snapshots
