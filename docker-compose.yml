x-airflow-common: &airflow-common
  build: .
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-metadata:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # Analytics warehouse connection (read by the dbt profile and the extract tasks)
    WAREHOUSE_HOST: warehouse
    WAREHOUSE_PORT: '5432'
    WAREHOUSE_USER: warehouse
    WAREHOUSE_PASSWORD: warehouse
    WAREHOUSE_DB: warehouse
    WAREHOUSE_SCHEMA: analytics
    RAW_SCHEMA: raw
    DATA_DIR: /opt/airflow/data/raw
  user: "${AIRFLOW_UID:-50000}:0"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./include:/opt/airflow/include
    - ./data:/opt/airflow/data
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  depends_on: &airflow-common-depends-on
    airflow-metadata:
      condition: service_healthy

services:
  # ---- Airflow metadata database (internal bookkeeping only) ----
  airflow-metadata:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-metadata-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    restart: always

  # ---- Analytics warehouse (raw + dbt models land here) ----
  warehouse:
    image: postgres:16
    environment:
      POSTGRES_USER: warehouse
      POSTGRES_PASSWORD: warehouse
      POSTGRES_DB: warehouse
    ports:
      - "5434:5432"   # exposed on host:5434 so you can connect with a SQL client
    volumes:
      - warehouse-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "warehouse"]
      interval: 10s
      retries: 5
    restart: always

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create --username admin --password admin \
          --firstname Admin --lastname User --role Admin --email admin@example.com || true
        airflow connections add warehouse_postgres \
          --conn-uri 'postgresql://warehouse:warehouse@warehouse:5432/warehouse' || true
        # Fetch dbt packages (dbt_utils) into the mounted project so Cosmos can
        # parse the dbt graph at DAG-parse time.
        /opt/dbt-venv/bin/dbt deps --project-dir /opt/airflow/include/dbt || true
    depends_on:
      <<: *airflow-common-depends-on

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ---- Metabase BI (uses embedded H2 for its own app data; reads marts from warehouse) ----
  metabase:
    image: metabase/metabase:latest
    ports:
      - "3000:3000"
    depends_on:
      warehouse:
        condition: service_healthy
    restart: always

volumes:
  airflow-metadata-volume:
  warehouse-volume:
